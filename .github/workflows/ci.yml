name: IncidentIQ CI

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  python-quality-checks:
    name: Python Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall app generate_data.py

      - name: Run critical Ruff checks
        run: |
          ruff check app generate_data.py --select E9,F63,F7,F82

      - name: Generate synthetic data
        run: |
          python generate_data.py

      - name: Verify generated incident data exists
        run: |
          test -f data/incidents/incidents.json
          test -d data/runbooks

      - name: Import FastAPI application
        run: |
          python -c "from app.main import app; print(app.title)"

      - name: Run FastAPI smoke tests
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient

          from app.main import app

          client = TestClient(app)

          health_response = client.get("/health")
          assert health_response.status_code == 200
          assert health_response.json()["status"] == "healthy"

          metrics_response = client.get("/metrics")
          assert metrics_response.status_code == 200
          assert metrics_response.json()["app_name"] == "IncidentIQ"

          prometheus_response = client.get("/metrics/prometheus")
          assert prometheus_response.status_code == 200
          assert "incidentiq_uptime_seconds" in prometheus_response.text

          print("FastAPI smoke tests passed")
          PY

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs:
      - python-quality-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t incidentiq-api:ci .