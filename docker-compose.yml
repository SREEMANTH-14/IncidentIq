services:
  incidentiq-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incidentiq-api
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - incidentiq_data:/app/data
      - incidentiq_storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  incidentiq_data:
  incidentiq_storage: